# Configuracion de ejemplo para Nginx como proxy reverso hacia Gunicorn.
# Ajusta server_name al subdominio o dominio que vayas a usar,
# por ejemplo: rifa.curiositylogic.cloud

server {
    listen 80;
    server_name rifa.curiositylogic.cloud;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/rifa-app/static/;
    }
}

# Despues de aplicar esta configuracion, se recomienda activar HTTPS con:
#   sudo certbot --nginx -d rifa.curiositylogic.cloud
