<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Control de Rifa{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <h1><a href="{{ url_for('index') }}">Control de Rifa</a></h1>
        <nav>
            <a href="{{ url_for('index') }}">Transacciones</a>
            <a href="{{ url_for('nueva_transaccion') }}">Nueva Transaccion</a>
            <a href="{{ url_for('configuracion') }}">Configuracion</a>
            <a href="{{ url_for('exportar_excel') }}">Exportar a Excel</a>
        </nav>
    </header>

    <main class="container">
        {% with mensajes = get_flashed_messages(with_categories=true) %}
            {% if mensajes %}
                <div class="flashes">
                    {% for categoria, mensaje in mensajes %}
                        <div class="flash flash-{{ categoria }}">{{ mensaje }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
